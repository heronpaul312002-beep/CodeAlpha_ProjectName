<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Language Translator</title>
    <style>
        :root {
            --bg: #f1f5f9;
            --surface: #ffffff;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text: #0f172a;
            --text-light: #64748b;
            --border: #cbd5e1;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .translator-container {
            width: 100%;
            max-width: 550px;
            background: var(--surface);
            padding: 2rem 1.5rem;
            border-radius: var(--radius);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        header h1 {
            font-size: 1.75rem;
            color: var(--primary);
            font-weight: 800;
        }

        header p {
            font-size: 0.875rem;
            color: var(--text-light);
            margin-top: 0.25rem;
        }

        /* Select Controls Row */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        select {
            flex: 1;
            padding: 0.65rem;
            font-size: 0.95rem;
            font-weight: 600;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--surface);
            color: var(--text);
            outline: none;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--primary);
        }

        .swap-btn {
            background: #eff6ff;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--primary);
            transition: transform 0.2s;
        }

        .swap-btn:active {
            transform: scale(0.9) rotate(180deg);
        }

        /* Text Boxes Wrapper */
        .io-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .box-container {
            position: relative;
            width: 100%;
        }

        textarea {
            width: 100%;
            min-height: 130px;
            padding: 1rem;
            padding-bottom: 2.75rem; /* Space for action icons */
            font-size: 1.05rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            resize: none;
            outline: none;
            color: var(--text);
            background-color: var(--surface);
        }

        textarea:focus {
            border-color: var(--primary);
        }

        textarea::placeholder {
            color: var(--text-light);
        }

        textarea:disabled {
            background-color: #f8fafc;
            color: var(--text);
            cursor: not-allowed;
        }

        /* Utilities Overlay Row inside Textareas */
        .box-utilities {
            position: absolute;
            bottom: 0.75rem;
            right: 0.75rem;
            display: flex;
            gap: 0.5rem;
        }

        .util-btn {
            background: #f1f5f9;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-light);
            transition: all 0.2s;
        }

        .util-btn:hover {
            background: #e2e8f0;
            color: var(--text);
        }

        .util-btn:active {
            transform: scale(0.9);
        }

        /* Main Translation Trigger Action Button */
        .translate-btn {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
            transition: all 0.2s;
        }

        .translate-btn:hover {
            background-color: var(--primary-hover);
        }

        .translate-btn:disabled {
            background-color: var(--border);
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="translator-container">
        <header>
            <h1>Global Translatr</h1>
            <p>Instant language translation & vocalization</p>
        </header>

        <div class="controls-row">
            <select id="src-lang-select"></select>
            
            <button class="swap-btn" onclick="swapLanguages()" title="Swap Languages">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 16V4M7 4L3 8M7 4l4 4M17 8v12M17 20l-4-4M17 20l4-4"/></svg>
            </button>
            
            <select id="target-lang-select"></select>
        </div>

        <div class="io-wrapper">
            <div class="box-container">
                <textarea id="source-text" placeholder="Type or paste your phrase here..."></textarea>
                <div class="box-utilities">
                    <button class="util-btn" onclick="speakText('source-text', 'src-lang-select')" title="Listen Input">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                    </button>
                </div>
            </div>

            <div class="box-container">
                <textarea id="target-text" placeholder="Translation mapping appears here..." disabled></textarea>
                <div class="box-utilities">
                    <button class="util-btn" onclick="copyToClipboard()" title="Copy Translation">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    </button>
                    <button class="util-btn" onclick="speakText('target-text', 'target-lang-select')" title="Listen Translation">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <button class="translate-btn" id="submit-btn" onclick="executeTranslation()">Translate Text</button>
    </div>

    <script>
        // Core Supported Languages Mapping Array Configuration Dataset
        const ISO_LANGUAGES = {
            "en-GB": "English",
            "es-ES": "Spanish",
            "fr-FR": "French",
            "de-DE": "German",
            "it-IT": "Italian",
            "ja-JP": "Japanese",
            "zh-CN": "Chinese (Simplified)",
            "ar-SA": "Arabic",
            "hi-IN": "Hindi",
            "pt-PT": "Portuguese",
            "ru-RU": "Russian"
        };

        // DOM element cache captures
        const srcSelect = document.getElementById('src-lang-select');
        const targetSelect = document.getElementById('target-lang-select');
        const sourceTextArea = document.getElementById('source-text');
        const targetTextArea = document.getElementById('target-text');
        const submitBtn = document.getElementById('submit-btn');

        // Setup drop-down list states dynamically
        function setupLanguages() {
            Object.entries(ISO_LANGUAGES).forEach(([code, name]) => {
                let srcOption = new Option(name, code);
                let targetOption = new Option(name, code);
                srcSelect.add(srcOption);
                targetSelect.add(targetOption);
            });

            // Anchor defaults intuitively (English -> Spanish)
            srcSelect.value = "en-GB";
            targetSelect.value = "es-ES";
        }

        // Direct Inter-Switching Position Toggle Engine
        function swapLanguages() {
            const tempLangCode = srcSelect.value;
            srcSelect.value = targetSelect.value;
            targetSelect.value = tempLangCode;

            // Swap texts cleanly if present to save re-typing
            const tempText = sourceTextArea.value;
            sourceTextArea.value = targetTextArea.value;
            targetTextArea.value = tempText;
        }

        // Main HTTP asynchronous execution request driver matching MyMemory specs
        async function executeTranslation() {
            const textToTranslate = sourceTextArea.value.trim();
            if (!textToTranslate) return;

            // Fetch formatting setup codes extraction
            const fromLang = srcSelect.value.split('-')[0];
            const toLang = targetSelect.value.split('-')[0];

            // Toggle loading text state configurations UI
            submitBtn.disabled = true;
            submitBtn.textContent = "Processing Translation...";
            targetTextArea.placeholder = "Querying translation matrix data...";

            const API_ENDPOINT = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(textToTranslate)}&langpair=${fromLang}|${toLang}`;

            try {
                const response = await fetch(API_ENDPOINT);
                if (!response.ok) throw new Error("Network latency failed transaction check.");
                
                const data = await response.json();
                
                if (data.responseData) {
                    targetTextArea.value = data.responseData.translatedText;
                } else {
                    targetTextArea.value = "Error parsing response stream configuration.";
                }
            } catch (error) {
                console.error(error);
                targetTextArea.value = "Failed connecting to translation server. Check your network internet hookup.";
            } finally {
                // Return control usability settings back normal
                submitBtn.disabled = false;
                submitBtn.textContent = "Translate Text";
            }
        }

        // Clipboard Copy Action Manager
        function copyToClipboard() {
            const outputValue = targetTextArea.value;
            if (!outputValue) return;

            navigator.clipboard.writeText(outputValue)
                .then(() => {
                    alert("Translation copied text safely to clipboard storage!");
                })
                .catch(() => {
                    // Fallback targeting older devices lacking programmatic navigator permissions
                    targetTextArea.removeAttribute('disabled');
                    targetTextArea.select();
                    document.execCommand('copy');
                    targetTextArea.setAttribute('disabled', true);
                    alert("Text copied successfully.");
                });
        }

        // Native Browser Audio Web Speech Speech Synthesis TTS Wrapper
        function speakText(textareaId, languageSelectId) {
            const text = document.getElementById(textareaId).value;
            const localeCode = document.getElementById(languageSelectId).value;

            if (!text) return;

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Terminate lingering voice threads
                const voiceSpeechPacket = new SpeechSynthesisUtterance(text);
                voiceSpeechPacket.lang = localeCode;
                window.speechSynthesis.speak(voiceSpeechPacket);
            } else {
                alert("Your mobile browser does not natively support the voice playback synthesis engine.");
            }
        }

        // Bootstrap App on load initialization
        setupLanguages();
    </script>
</body>
</html>
