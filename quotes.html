<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            transition: background-color 0.5s ease;
        }

        .quote-container {
            background-color: var(--card-bg);
            padding: 3rem 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.05);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 550px;
            text-align: center;
            position: relative;
        }

        /* Decorative Quote Icon */
        .quote-icon {
            font-size: 4rem;
            font-family: Georgia, serif;
            color: #e0e7ff;
            line-height: 1;
            position: absolute;
            top: 1rem;
            left: 2rem;
            user-select: none;
        }

        .quote-text {
            font-size: 1.5rem;
            font-weight: 500;
            line-height: 1.5;
            color: var(--text-main);
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 1;
            /* Animation effect class triggers this */
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .quote-author {
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            transition: opacity 0.3s ease;
        }

        .quote-author::before {
            content: "— ";
        }

        .btn-new-quote {
            background-color: var(--accent);
            color: #ffffff;
            border: none;
            padding: 0.85rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
            transition: all 0.2s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-new-quote:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.3);
        }

        .btn-new-quote:active {
            transform: translateY(1px);
        }

        /* Animation State */
        .fade-out {
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="quote-container">
        <div class="quote-icon">“</div>
        <div class="quote-text" id="quote">Loading inspiration...</div>
        <div class="quote-author" id="author"></div>
        <button class="btn-new-quote" id="new-quote-btn" onclick="getNewQuote()">New Quote</button>
    </div>

    <script>
        // Array of curated quotes and authors
        const quotesPool = [
            { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
            { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
            { text: "Do what you can, with what you have, where you are.", author: "Theodore Roosevelt" },
            { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
            { text: "Your time is limited, so don't waste it living someone else's life.", author: "Steve Jobs" },
            { text: "It always seems impossible until it's done.", author: "Nelson Mandela" },
            { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
            { text: "Strive not to be a success, but rather to be of value.", author: "Albert Einstein" },
            { text: "You miss 100% of the shots you don't take.", author: "Wayne Gretzky" },
            { text: "The best way to predict your future is to create it.", author: "Abraham Lincoln" }
        ];

        const quoteEl = document.getElementById('quote');
        const authorEl = document.getElementById('author');
        let lastIndex = -1;

        function getNewQuote() {
            // Apply fade-out animation
            quoteEl.classList.add('fade-out');
            authorEl.classList.add('fade-out');

            // Wait for fade-out transition to complete before changing the text
            setTimeout(() => {
                let randomIndex;
                
                // Ensure the app doesn't pick the same quote twice in a row
                do {
                    randomIndex = Math.floor(Math.random() * quotesPool.length);
                } while (randomIndex === lastIndex && quotesPool.length > 1);
                
                lastIndex = randomIndex;
                const randomQuote = quotesPool[randomIndex];

                // Update text strings
                quoteEl.textContent = randomQuote.text;
                authorEl.textContent = randomQuote.author;

                // Fade back in
                quoteEl.classList.remove('fade-out');
                authorEl.classList.remove('fade-out');
            }, 300); // Maps perfectly to the 0.3s CSS transition
        }

        // Trigger a random quote immediately upon application launch
        window.onload = getNewQuote;
    </script>
</body>
</html>
