<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI FAQ System</title>
    <style>
        /* Modern Vibrant Glassmorphism Design System */
        :root, [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --surface: rgba(30, 41, 59, 0.85);
            --border: rgba(71, 85, 105, 0.5);
            --primary: #4f46e5;
            --accent: #ec4899;
            --text: #f8fafc;
            --text-light: #94a3b8;
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .chat-container {
            width: 100%;
            max-width: 520px;
            height: 88vh;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Upper App Layout Panel Header */
        header {
            padding: 1.25rem 1.5rem;
            background: rgba(15, 23, 42, 0.4);
            border-bottom: 1px solid var(--border);
        }

        .header-main {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .bot-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }

        .header-info h2 { font-size: 1.2rem; font-weight: 700; }
        .header-info p { font-size: 0.78rem; color: #10b981; font-weight: 600; display: flex; align-items: center; gap: 0.25rem; }
        .header-info p::before { content: ''; display: inline-block; width: 6px; height: 6px; background: #10b981; border-radius: 50%; }

        /* ADVANCED FEATURE: Knowledge Search Bar utility wrapper */
        .search-box-wrapper {
            position: relative;
            width: 100%;
        }

        .search-box-wrapper input {
            width: 100%;
            padding: 0.65rem 1rem 0.65rem 2.5rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 0.88rem;
            outline: none;
        }

        .search-box-wrapper input:focus { border-color: var(--primary); }
        .search-box-wrapper svg { position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--text-light); }

        /* Dynamic Suggestion Chips Row */
        .suggestion-chips-row {
            display: flex;
            gap: 0.5rem;
            padding: 0.6rem 1.5rem;
            background: rgba(15, 23, 42, 0.2);
            overflow-x: auto;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        .suggestion-chips-row::-webkit-scrollbar { display: none; }

        .chip {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            color: var(--text-light);
            transition: all 0.2s;
        }
        .chip:hover { background: var(--primary); color: white; border-color: transparent; }

        /* Core Interactive Messages Thread Board */
        .chat-messages {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .msg-row { display: flex; width: 100%; }
        .msg-row.user { justify-content: flex-end; }
        .msg-row.bot { justify-content: flex-start; }

        .bubble {
            max-width: 82%;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            line-height: 1.55;
            border-radius: var(--radius-md);
            position: relative;
            animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .msg-row.user .bubble {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg-row.bot .bubble {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom-left-radius: 4px;
        }

        /* ADVANCED FEATURE: Mathematical Metadata Score Tagging Badge */
        .score-badge {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 0.15rem 0.4rem;
            background: rgba(236, 72, 153, 0.15);
            color: var(--accent);
            border-radius: 4px;
            margin-top: 0.5rem;
            border: 1px solid rgba(236, 72, 153, 0.2);
        }

        /* NEW COMPONENT: Interactive Answer Buttons Container */
        .answer-buttons-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.75rem;
            width: 100%;
        }

        .action-reply-btn {
            background: rgba(79, 70, 229, 0.15);
            color: #a5b4fc;
            border: 1px solid rgba(79, 70, 229, 0.4);
            padding: 0.6rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
            width: 100%;
        }

        .action-reply-btn:hover {
            background: var(--primary);
            color: white;
            border-color: transparent;
            transform: translateX(4px);
        }

        /* Bottom Controls Input Panel Bar Footer */
        .chat-input-area {
            padding: 1rem 1.25rem;
            background: rgba(15, 23, 42, 0.4);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.75rem;
        }

        .chat-input-area input {
            flex: 1;
            padding: 0.9rem 1.4rem;
            font-size: 1rem;
            background: #090d16;
            border: 1px solid var(--border);
            border-radius: 30px;
            color: white;
            outline: none;
        }
        .chat-input-area input:focus { border-color: var(--primary); }

        .send-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        @keyframes popIn { from { opacity: 0; transform: translateY(8px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
    </style>
</head>
<body>

    <div class="chat-container">
        <header>
            <div class="header-main">
                <div class="bot-avatar">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </div>
                <div class="header-info">
                    <h2>Advanced NLP Support Engine</h2>
                    <p>Vector Analytics Match Active</p>
                </div>
            </div>
            
            <div class="search-box-wrapper">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="kb-search" placeholder="Search the FAQ knowledge base directly..." oninput="filterKnowledgeBase()">
            </div>
        </header>

        <div class="suggestion-chips-row">
            <div class="chip" onclick="useChip('Track Order')">📦 Track Order</div>
            <div class="chip" onclick="useChip('Refund Policy')">💰 Refunds</div>
            <div class="chip" onclick="useChip('Global Shipping')">🌐 Global Shipping</div>
            <div class="chip" onclick="useChip('Payment Methods')">💳 Payments</div>
            <div class="chip" onclick="useChip('Reset Password')">🔒 Account Recovery</div>
        </div>

        <div class="chat-messages" id="chat-thread">
            <div class="msg-row bot">
                <div class="bubble">Welcome! I'm an advanced vector-matching assistant. Type your support query below or use the tracking search toolbar above!</div>
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="query-input" placeholder="Ask a support question..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </div>

    <script>
        // Advanced Comprehensive Enterprise FAQ Database Corpus Document Arrays
        const FAQ_CORPUS = [
            { id: "track", display: "📦 Track a Shipment", q: "How can I track my shipment package or delivery status tracking?", a: "You can track your order in real-time by navigating to the 'My Orders' section in your profile dashboard or by checking your confirmation email tracking link." },
            { id: "refund", display: "💰 Return & Refund Policy", q: "What is your refund exchange policy and return conditions guidelines?", a: "We offer a 30-day hassle-free return policy. Items must be unworn, unwashed, and in their original packaging with tags for a full reimbursement." },
            { id: "shipping", display: "🌐 Global Shipping Areas", q: "Do you offer international shipping global country outside delivery rates?", a: "Yes, we ship globally to over 120 countries! Standard and express international shipping rates are calculated dynamically at checkout." },
            { id: "payment", display: "💳 Accepted Payment Methods", q: "What payment methods do you accept credit card paypal crypto options?", a: "We accept all major credit/debit cards (Visa, MasterCard, Amex), PayPal, Apple Pay, Google Pay, and encrypted cryptocurrency tokens." },
            { id: "password", display: "🔒 Account Recovery & Password", q: "How do I reset my profile account password forgot locked credentials?", a: "Click 'Forgot Password' on the login window portal, input your email address, and an automated secured recovery link will be dispatched immediately." }
        ];

        // List of common english words to strip out for cleaner sentence vectorizing
        const STOP_WORDS = new Set(["how", "what", "do", "you", "i", "can", "my", "is", "your", "an", "the", "a", "of", "to", "in", "or", "by", "for", "with", "on"]);

        const threadContainer = document.getElementById('chat-thread');
        const inputField = document.getElementById('query-input');

        function useChip(text) { inputField.value = text; inputField.focus(); }

        // ==============================================================================
        // ADVANCED INTEGRATION: REAL-TIME SEARCH BOX FILTER LOGIC
        // ==============================================================================
        function filterKnowledgeBase() {
            const val = document.getElementById('kb-search').value.toLowerCase().trim();
            if (!val) return;

            // Clear old messages and isolate match responses
            threadContainer.innerHTML = `<div class="msg-row bot"><div class="bubble">🔍 Showing instant results filtering for: <i>"${val}"</i></div></div>`;
            
            let hits = 0;
            FAQ_CORPUS.forEach(doc => {
                if (doc.q.toLowerCase().includes(val) || doc.a.toLowerCase().includes(val)) {
                    const row = document.createElement('div');
                    row.className = 'msg-row bot';
                    row.innerHTML = `<div class="bubble"><b>Q: ${doc.q.split('?')[0]}?</b><br><br>${doc.a}</div>`;
                    threadContainer.appendChild(row);
                    hits++;
                }
            });

            if (hits === 0) {
                appendBubble("No explicit knowledge bases match your direct search constraints. Try typing freely in the conversation zone below.", "bot");
            }
        }

        // ==============================================================================
        // ADVANCED INTEGRATION: JS COSINE SIMILARITY MATRIX ENGINE
        // ==============================================================================
        function tokenizeAndClean(sentence) {
            return sentence.toLowerCase()
                .replace(/[^\w\s]/g, '') // Strip punctuation marks completely
                .split(/\s+/)
                .filter(word => word && !STOP_WORDS.has(word));
        }

        function computeVectorCosineMatch(userQuery) {
            const queryTokens = tokenizeAndClean(userQuery);
            if (queryTokens.length === 0) return { idx: -1, score: 0 };

            let bestIndex = -1;
            let highestSimilarity = 0;

            // Loop through each document inside our FAQ knowledge corpus array
            FAQ_CORPUS.forEach((doc, docIdx) => {
                const docTokens = tokenizeAndClean(doc.q);

                // Build a unified dictionary for tracking absolute dimensions
                const vocabulary = Array.from(new Set([...queryTokens, ...docTokens]));

                // Create standard binary Bag-of-Words (BoW) tracking vectors
                const queryVector = vocabulary.map(word => queryTokens.includes(word) ? 1 : 0);
                const docVector = vocabulary.map(word => docTokens.includes(word) ? 1 : 0);

                // Vector Math Calculation: Calculate Dot Product
                let dotProduct = 0;
                let queryMagnitudeSq = 0;
                let docMagnitudeSq = 0;

                for (let i = 0; i < vocabulary.length; i++) {
                    dotProduct += queryVector[i] * docVector[i];
                    queryMagnitudeSq += queryVector[i] * queryVector[i];
                    docMagnitudeSq += docVector[i] * docVector[i];
                }

                const queryMagnitude = Math.sqrt(queryMagnitudeSq);
                const docMagnitude = Math.sqrt(docMagnitudeSq);

                // Edge case handling for division by zero arrays
                let cosineSimilarityScore = 0;
                if (queryMagnitude && docMagnitude) {
                    cosineSimilarityScore = dotProduct / (queryMagnitude * docMagnitude);
                }

                if (cosineSimilarityScore > highestSimilarity) {
                    highestSimilarity = cosineSimilarityScore;
                    bestIndex = docIdx;
                }
            });

            return { idx: bestIndex, score: highestSimilarity };
        }

        // Trigger manual answer resolution via button selection
        function selectAnswerFromButton(corpusId) {
            const documentMatch = FAQ_CORPUS.find(item => item.id === corpusId);
            if (!documentMatch) return;

            appendBubble(`Selected: ${documentMatch.display}`, 'user');
            
            setTimeout(() => {
                appendBubble(`${documentMatch.a}<br><span class="score-badge">Direct Intent Selection</span>`, 'bot');
            }, 300);
        }

        // ==============================================================================
        // DISPATCH DRIVERS
        // ==============================================================================
        function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            appendBubble(text, 'user');
            inputField.value = '';

            setTimeout(() => {
                const matchResult = computeVectorCosineMatch(text);
                
                // Set custom strict threshold rules (0.22 math mapping score boundaries)
                if (matchResult.idx !== -1 && matchResult.score >= 0.22) {
                    const percentageScore = Math.round(matchResult.score * 100);
                    const faqAnswer = FAQ_CORPUS[matchResult.idx].a;
                    
                    // Display response with tracking analytics structural payload indicators
                    appendBubble(`${faqAnswer}<br><span class="score-badge">NLP Confidence Score: ${percentageScore}%</span>`, 'bot');
                } else {
                    // Injecting UI Answer Button Interface Templates dynamically
                    let buttonPayloadHTML = `
                        I couldn't quite find a confident match for that question in my vector matrix. 
                        Please select one of our verified topics below:
                        <div class="answer-buttons-container">
                    `;
                    
                    FAQ_CORPUS.forEach(item => {
                        buttonPayloadHTML += `<button class="action-reply-btn" onclick="selectAnswerFromButton('${item.id}')">${item.display}</button>`;
                    });
                    
                    buttonPayloadHTML += `</div>`;
                    appendBubble(buttonPayloadHTML, 'bot');
                }
            }, 400);
        }

        function appendBubble(content, sender) {
            const row = document.createElement('div');
            row.className = `msg-row ${sender}`;
            row.innerHTML = `<div class="bubble">${content}</div>`;
            threadContainer.appendChild(row);
            threadContainer.scrollTop = threadContainer.scrollHeight;
        }
    </script>
</body>
</html>
